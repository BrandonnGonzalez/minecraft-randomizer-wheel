<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Minecraft Item Randomizer</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:'Press Start 2P',monospace;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;overflow-y:auto;
  padding:12px 12px 32px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}

/* ═══════════════════ THEME CSS VARIABLES ═══════════════════ */
[data-theme="day"]{
  --sky-top:#87CEEB; --sky-bot:#a8dff5;
  --grass:#5D8A33;   --grass-dark:#4a7228;
  --dirt1:#8B5E3C;   --dirt2:#6B4423; --dirt3:#4a2f14;
  --cloud-col:#ffffff; --cloud-op:0.95;
  --panel-bg:rgba(16,8,2,0.95);
  --panel-border:#6B4423; --panel-shine:#A0632A;
  --text-main:#56D63C; --text-gold:#FFD700; --text-muted:#9A9A9A;
  --badge-bg:rgba(255,255,255,.05); --badge-border:#333;
  --overlay:rgba(0,0,0,.82);
  --stars-op:0; --night-glow-op:0;
  --sun-op:1; --moon-op:0;
  --btn-shadow:#3a5a1e;
  --toggle-hint:"Switch to Night";
}
[data-theme="night"]{
  --sky-top:#03060f; --sky-bot:#070d1e;
  --grass:#1e3a10;   --grass-dark:#152b0b;
  --dirt1:#3a2010;   --dirt2:#28140a; --dirt3:#180c04;
  --cloud-col:#7088aa; --cloud-op:0.28;
  --panel-bg:rgba(4,2,10,0.97);
  --panel-border:#1e1040; --panel-shine:#3a2070;
  --text-main:#88bbff; --text-gold:#b898ff; --text-muted:#5060a0;
  --badge-bg:rgba(80,100,220,.07); --badge-border:#151530;
  --overlay:rgba(0,0,8,.9);
  --stars-op:1; --night-glow-op:1;
  --sun-op:0; --moon-op:1;
  --btn-shadow:#3a5a1e;
  --toggle-hint:"Switch to Day";
}

/* ═══════════════════ BACKGROUND ═══════════════════ */
.bg{
  position:fixed;inset:0;z-index:0;
  transition:background 1.2s ease;
  background:linear-gradient(
    180deg,
    var(--sky-top) 0%,var(--sky-bot) 54%,
    var(--grass) 54%,var(--grass-dark) 60%,
    var(--dirt1) 60%,var(--dirt2) 73%,
    var(--dirt2) 73%,var(--dirt3) 83%,
    #100804 83%,#0a0502 100%
  );
}
/* pixel grid */
.bg::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(90deg,transparent 0 15px,rgba(0,0,0,.04) 15px 16px),
    repeating-linear-gradient(0deg,transparent 0 15px,rgba(0,0,0,.03) 15px 16px);
}
.dirt-lines{
  position:absolute;top:60%;left:0;right:0;bottom:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0 11px,rgba(0,0,0,.13) 11px 12px);
}

/* ── Stars ── */
.stars{
  position:absolute;top:0;left:0;width:100%;height:55%;
  opacity:var(--stars-op);transition:opacity 1.3s ease;pointer-events:none;
}
.star{position:absolute;background:#fff;border-radius:50%;}
@keyframes twinkle{0%,100%{opacity:.95}45%{opacity:.1}}

/* ── Night ambient glow ── */
.night-glow{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 55% at 50% 0%,rgba(20,10,70,.55) 0%,transparent 65%);
  opacity:var(--night-glow-op);transition:opacity 1.3s ease;
}

/* ── Sun ── */
.sun{
  position:absolute;top:7%;right:18%;
  width:clamp(38px,6.5vw,54px);height:clamp(38px,6.5vw,54px);
  background:#FFE066;
  box-shadow:0 0 0 5px #FFD700,0 0 0 11px rgba(255,210,0,.2);
  image-rendering:pixelated;
  opacity:var(--sun-op);transition:opacity 1s ease;
}

/* ── Moon ── */
.moon{
  position:absolute;top:7%;right:18%;
  width:clamp(34px,6vw,50px);height:clamp(34px,6vw,50px);
  border-radius:50%;background:#c8d4f0;
  box-shadow:0 0 0 4px #8898c0,0 0 0 8px rgba(160,180,255,.13),0 0 28px 6px rgba(140,160,255,.18);
  overflow:hidden;image-rendering:pixelated;
  opacity:var(--moon-op);transition:opacity 1s ease;
}
.moon::before{
  content:'';position:absolute;width:33%;height:33%;background:#aab4d8;
  border-radius:50%;top:18%;left:20%;box-shadow:16px 14px 0 rgba(0,0,60,.1);
}
.moon::after{
  content:'';position:absolute;width:20%;height:20%;background:#b0bce0;
  border-radius:50%;top:57%;left:58%;
}

/* ── Clouds ── */
.cloud{position:absolute;background:var(--cloud-col);opacity:var(--cloud-op);transition:background 1.2s,opacity 1.2s;}
.c1{top:9%;left:5%;width:80px;height:22px;
  box-shadow:16px -16px 0 var(--cloud-col),32px -16px 0 var(--cloud-col),48px -16px 0 var(--cloud-col),64px -16px 0 var(--cloud-col),16px 0 0 var(--cloud-col),64px 0 0 var(--cloud-col);
  animation:drift 30s linear infinite;}
.c2{top:17%;left:42%;width:64px;height:16px;
  box-shadow:16px -14px 0 var(--cloud-col),32px -14px 0 var(--cloud-col),0px 0 0 var(--cloud-col),48px 0 0 var(--cloud-col);
  animation:drift 50s linear infinite;}
.c3{top:5%;right:12%;width:96px;height:22px;
  box-shadow:16px -16px 0 var(--cloud-col),32px -16px 0 var(--cloud-col),48px -16px 0 var(--cloud-col),64px -16px 0 var(--cloud-col),80px -16px 0 var(--cloud-col),0px 0 0 var(--cloud-col),80px 0 0 var(--cloud-col);
  animation:drift 38s linear infinite;}
@keyframes drift{from{transform:translateX(-130px)}to{transform:translateX(110vw)}}

/* ═══════════════════ THEME TOGGLE BUTTON ═══════════════════ */
.theme-toggle{
  position:fixed;top:12px;right:12px;z-index:100;
  display:flex;align-items:center;gap:8px;
  background:var(--panel-bg);
  border:3px solid var(--panel-border);
  box-shadow:3px 3px 0 rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08);
  padding:8px 11px;cursor:pointer;
  transition:background .5s,border-color .5s,box-shadow .1s,transform .08s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  /* min touch target */
  min-width:44px;min-height:44px;
}
.theme-toggle:hover{filter:brightness(1.2);}
.theme-toggle:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.5);}
.toggle-icon{font-size:clamp(15px,4.5vw,20px);line-height:1;pointer-events:none;}
.toggle-label{
  font-size:clamp(5px,1.5vw,7px);color:var(--text-gold);
  letter-spacing:.05em;transition:color .5s;pointer-events:none;
}
@media(max-width:400px){.toggle-label{display:none;}}

/* ═══════════════════ APP SHELL ═══════════════════ */
#app{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(10px,3vw,16px);
  width:100%;max-width:min(500px,100%);
  padding-top:60px;
}

/* ═══════════════════ PANEL ═══════════════════ */
.panel{
  background:var(--panel-bg);
  border:4px solid var(--panel-border);
  outline:2px solid var(--panel-shine);outline-offset:-7px;
  box-shadow:6px 6px 0 rgba(0,0,0,.55);
  padding:clamp(14px,4vw,24px) clamp(12px,4vw,22px) clamp(18px,4vw,28px);
  width:100%;
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(10px,3vw,16px);
  transition:background .6s,border-color .6s,outline-color .6s;
}
.title{
  font-size:clamp(10px,3vw,15px);
  color:var(--text-main);
  text-shadow:2px 2px 0 rgba(0,0,0,.7);
  text-align:center;line-height:2;letter-spacing:.04em;
  transition:color .5s;
}
.title b{color:var(--text-gold);text-shadow:2px 2px 0 rgba(0,0,0,.7);transition:color .5s;}
.badge{
  font-size:clamp(5px,1.7vw,8px);color:var(--text-muted);
  background:var(--badge-bg);border:2px solid var(--badge-border);
  padding:5px clamp(10px,3vw,16px);letter-spacing:.06em;
  transition:color .5s,border-color .5s;
}

/* ─ Loading bar ─ */
.load-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;}
.load-bar-bg{width:min(260px,88%);height:20px;background:#111;border:3px solid #444;}
.load-bar{height:100%;background:var(--text-main);transition:width .18s,background .5s;box-shadow:inset 0 2px 0 rgba(255,255,255,.15);}
.load-msg{font-size:clamp(5px,1.7vw,7px);color:var(--text-muted);text-align:center;letter-spacing:.06em;}

/* ═══════════════════ WHEEL ═══════════════════ */
.wheel-area{
  position:relative;
  width:min(340px,calc(100vw - 52px));
  height:min(340px,calc(100vw - 52px));
  flex-shrink:0;
}
.wheel-area::before{
  content:'';position:absolute;inset:-10px;border-radius:50%;
  background:var(--panel-border);
  box-shadow:0 0 0 4px rgba(0,0,0,.55),0 0 0 7px var(--panel-shine),5px 5px 0 rgba(0,0,0,.5);
  z-index:0;transition:background .6s,box-shadow .6s;
}
.wheel-border{
  position:absolute;inset:0;border-radius:50%;overflow:hidden;
  border:5px solid var(--panel-shine);z-index:1;transition:border-color .6s;
}
#wc{width:100%;height:100%;image-rendering:pixelated;display:block;border-radius:50%;}
.hub{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:clamp(26px,8vw,38px);height:clamp(26px,8vw,38px);border-radius:50%;
  background:#060310;border:4px solid var(--text-gold);
  box-shadow:0 0 0 3px rgba(0,0,0,.6),inset 0 0 10px rgba(0,0,0,.9);
  z-index:3;pointer-events:none;transition:border-color .5s;
}
.pointer{
  position:absolute;top:-5px;left:50%;transform:translateX(-50%);z-index:4;
  width:0;height:0;
  border-left:clamp(10px,3.5vw,14px) solid transparent;
  border-right:clamp(10px,3.5vw,14px) solid transparent;
  border-top:clamp(28px,9vw,38px) solid #CC0000;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.7));
}

/* ═══════════════════ SPIN BUTTON ═══════════════════ */
#spinBtn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(10px,3vw,14px);
  color:#1a0e00;background:#5D8A33;
  border:none;outline:none;cursor:pointer;
  padding:clamp(14px,4.5vw,20px) 0;
  width:100%;min-height:52px;
  letter-spacing:.04em;
  box-shadow:0 7px 0 #3a5a1e,0 10px 0 rgba(0,0,0,.5),inset 0 2px 0 rgba(255,255,255,.22),inset -2px 0 0 rgba(0,0,0,.12);
  text-shadow:1px 1px 0 rgba(255,255,255,.2);
  transition:transform .08s,box-shadow .08s,background .08s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
#spinBtn:hover:not(:disabled){background:#6EA03D;transform:translateY(-2px);box-shadow:0 9px 0 #3a5a1e,0 12px 0 rgba(0,0,0,.5),inset 0 2px 0 rgba(255,255,255,.22);}
#spinBtn:active:not(:disabled){transform:translateY(6px);box-shadow:0 1px 0 #3a5a1e,0 2px 0 rgba(0,0,0,.4);}
#spinBtn:disabled{background:#2e2e3e;color:#555;cursor:not-allowed;box-shadow:0 4px 0 #1a1a28,0 5px 0 rgba(0,0,0,.3);}

.spin-label{
  font-size:clamp(6px,1.9vw,8px);color:var(--text-gold);min-height:16px;
  text-align:center;animation:blink .5s step-end infinite;transition:color .5s;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ═══════════════════ MODAL ═══════════════════ */
#modal{
  display:none;position:fixed;inset:0;z-index:200;
  background:var(--overlay);
  align-items:center;justify-content:center;
  padding:16px;overflow-y:auto;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  transition:background .5s;
}
#modal.open{display:flex;}
@keyframes popIn{
  0%{transform:scale(.18) rotate(-12deg);opacity:0}
  65%{transform:scale(1.09) rotate(1.8deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}
.modal-box{
  background:var(--panel-bg);
  border:4px solid var(--panel-border);
  outline:2px solid var(--panel-shine);outline-offset:-7px;
  box-shadow:10px 10px 0 rgba(0,0,0,.65);
  padding:clamp(18px,5vw,36px) clamp(16px,5vw,40px);
  width:min(440px,calc(100vw - 28px));
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(12px,3.5vw,20px);
  animation:popIn .42s cubic-bezier(.34,1.56,.64,1) forwards;
  transition:background .5s,border-color .5s;
}
.modal-title{
  font-size:clamp(8px,2.5vw,13px);color:var(--text-gold);
  text-shadow:2px 2px 0 rgba(0,0,0,.6);text-align:center;transition:color .5s;
}
.modal-icon-wrap{
  width:clamp(62px,18vw,88px);height:clamp(62px,18vw,88px);
  border:4px solid var(--text-gold);
  box-shadow:0 0 0 2px var(--panel-border),inset 0 0 12px rgba(0,0,0,.5);
  background:#04020c;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  transition:border-color .5s;
}
#resultImg{width:80%;height:80%;object-fit:contain;image-rendering:pixelated;}
#resultEmoji{font-size:clamp(26px,9vw,40px);}
.modal-name{
  font-size:clamp(8px,2.8vw,12px);color:var(--text-main);
  text-shadow:1px 1px 0 rgba(0,0,0,.5);text-align:center;line-height:1.9;transition:color .5s;
}
.modal-cat{font-size:clamp(5px,1.6vw,8px);color:var(--text-muted);text-shadow:1px 1px 0 rgba(0,0,0,.4);transition:color .5s;}
.modal-desc{
  font-size:clamp(5px,1.5vw,7px);color:var(--text-muted);
  text-align:center;line-height:2;max-width:100%;min-height:14px;
  opacity:.75;transition:color .5s;
}
.modal-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;}
.modal-btn{
  font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.9vw,9px);
  border:none;outline:none;cursor:pointer;
  padding:clamp(10px,3vw,14px) clamp(14px,3.5vw,22px);
  letter-spacing:.04em;
  transition:transform .08s,box-shadow .08s,background .08s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  min-height:46px;flex:1;min-width:110px;
}
.btn-again{color:#1a0e00;background:#5D8A33;box-shadow:0 5px 0 #3a5a1e,0 7px 0 rgba(0,0,0,.4);}
.btn-again:hover{background:#6EA03D;transform:translateY(-2px);box-shadow:0 7px 0 #3a5a1e,0 9px 0 rgba(0,0,0,.4);}
.btn-again:active{transform:translateY(3px);box-shadow:0 2px 0 #3a5a1e,0 3px 0 rgba(0,0,0,.3);}
.btn-close{color:#fff;background:#990000;box-shadow:0 5px 0 #660000,0 7px 0 rgba(0,0,0,.4);}
.btn-close:hover{background:#bb0000;transform:translateY(-2px);box-shadow:0 7px 0 #660000,0 9px 0 rgba(0,0,0,.4);}
.btn-close:active{transform:translateY(3px);box-shadow:0 2px 0 #660000,0 3px 0 rgba(0,0,0,.3);}

/* ═══════════════════ RESPONSIVE ═══════════════════ */
/* Very small phones — tighten spacing */
@media(max-height:600px) and (orientation:portrait){
  #app{gap:8px;padding-top:52px;}
  .panel{gap:8px;padding:12px 12px 16px;}
}
/* Landscape phones — shrink wheel so it fits */
@media(max-height:500px) and (orientation:landscape){
  #app{flex-direction:row;flex-wrap:wrap;justify-content:center;padding-top:8px;max-width:98vw;}
  .panel{max-width:48%;min-width:260px;}
  .wheel-area{width:min(220px,38vh);height:min(220px,38vh);}
}
</style>
</head>
<body>

<!-- BG -->
<div class="bg">
  <div class="stars" id="stars"></div>
  <div class="night-glow"></div>
  <div class="sun"></div>
  <div class="moon"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="dirt-lines"></div>
</div>

<!-- TOGGLE -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle day/night mode">
  <span class="toggle-icon" id="toggleIcon">🌙</span>
  <span class="toggle-label" id="toggleLabel">NIGHT MODE</span>
</button>

<!-- APP -->
<div id="app">
  <div class="panel">
    <div class="title">⛏️ MINECRAFT<br/><b>ITEM RANDOMIZER</b></div>
    <div class="badge" id="badge">LOADING...</div>

    <div id="loadSection" class="load-wrap">
      <div class="load-bar-bg"><div class="load-bar" id="loadBar" style="width:0%"></div></div>
      <div class="load-msg" id="loadMsg">Initialising...</div>
    </div>

    <div id="wheelSection" style="display:none;width:100%;flex-direction:column;align-items:center;gap:14px;">
      <div class="wheel-area">
        <div class="wheel-border"><canvas id="wc"></canvas></div>
        <div class="hub"></div>
        <div class="pointer"></div>
      </div>
    </div>

    <div class="spin-label" id="spinLabel" style="display:none"></div>
    <button id="spinBtn" style="display:none" disabled>▶ SPIN THE WHEEL</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <div class="modal-title">✦ YOU GOT ✦</div>
    <div class="modal-icon-wrap">
      <img id="resultImg" src="" alt="" style="display:none"/>
      <span id="resultEmoji" style="display:none"></span>
    </div>
    <div class="modal-name" id="resultName"></div>
    <div class="modal-cat"  id="resultCat"></div>
    <div class="modal-desc" id="resultDesc"></div>
    <div class="modal-btns">
      <button class="modal-btn btn-again" id="btnAgain">▶ SPIN AGAIN</button>
      <button class="modal-btn btn-close" id="btnClose">✕ CLOSE</button>
    </div>
  </div>
</div>

<script>
/* ══════════ THEME TOGGLE ══════════ */
(function(){
  const html=document.documentElement;
  const btn=document.getElementById("themeToggle");
  const icon=document.getElementById("toggleIcon");
  const label=document.getElementById("toggleLabel");
  const starsEl=document.getElementById("stars");
  let night=false;

  // Generate twinkling stars
  for(let i=0;i<90;i++){
    const s=document.createElement("div");
    s.className="star "+(Math.random()>.55?"s2":"");
    s.style.cssText=`width:${Math.random()>.7?3:2}px;height:${Math.random()>.7?3:2}px;`
      +`top:${(Math.random()*98).toFixed(1)}%;left:${(Math.random()*100).toFixed(1)}%;`
      +`animation:twinkle ${(1.4+Math.random()*3).toFixed(1)}s ${(Math.random()*3).toFixed(1)}s infinite;`;
    starsEl.appendChild(s);
  }

  btn.addEventListener("click",()=>{
    night=!night;
    html.setAttribute("data-theme",night?"night":"day");
    icon.textContent=night?"☀️":"🌙";
    label.textContent=night?"DAY MODE":"NIGHT MODE";
    // redraw wheel with new colour palette
    if(typeof drawWheel==="function") drawWheel(currentAngle);
  });
})();

/* ══════════ ITEMS ══════════ */
const ITEMS=[

  {name:"Jungle Log",id:"jungle_log",cat:"Wood",e:"🪵"},
  {name:"Acacia Log",id:"acacia_log",cat:"Wood",e:"🪵"},
  {name:"Dark Oak Log",id:"dark_oak_log",cat:"Wood",e:"🪵"},
  {name:"Oak Planks",id:"oak_planks",cat:"Wood",e:"🟫"},
  {name:"Crafting Table",id:"crafting_table",cat:"Crafting",e:"🔨"},
  {name:"Furnace",id:"furnace",cat:"Crafting",e:"🔥"},
  {name:"Chest",id:"chest",cat:"Storage",e:"📦"},
  {name:"Cobblestone",id:"cobblestone",cat:"Stone",e:"🪨"},
  {name:"Stone",id:"stone",cat:"Stone",e:"🪨"},
  {name:"Gravel",id:"gravel",cat:"Stone",e:"🪨"},
  {name:"Sand",id:"sand",cat:"Natural",e:"🏖️"},
  {name:"Sandstone",id:"sandstone",cat:"Stone",e:"🟡"},
  {name:"Granite",id:"granite",cat:"Stone",e:"🪨"},
  {name:"Diorite",id:"diorite",cat:"Stone",e:"⬜"},
  {name:"Andesite",id:"andesite",cat:"Stone",e:"🪨"},
  {name:"Deepslate",id:"deepslate",cat:"Stone",e:"🖤"},
  {name:"Tuff",id:"tuff",cat:"Stone",e:"🪨"},

/* ══════════ WHEEL ENGINE ══════════ */
const IMG_BASE="https://minecraft-api.vercel.app/images/items/";

const DAY_COLS=[
  "#3a6e1e","#7a4820","#5a5a5a","#8a4a10","#1e7060","#6e1e1e",
  "#4e2e7a","#2e6e3e","#8a7010","#1e4a7a","#6a3030","#2a7a2a",
  "#7a5030","#205070","#702060","#508040","#304880","#804030",
];
const NIGHT_COLS=[
  "#0e1e3e","#1a0e34","#062828","#280e1a","#0e280e","#28180a",
  "#180628","#0a1e2e","#280614","#0e281a","#181828","#280e06",
  "#061228","#282808","#0e0628","#06280e","#1a2806","#280616",
];

const imgCache={};
function preloadImg(id){
  return new Promise(res=>{
    if(id in imgCache){res(imgCache[id]);return;}
    const img=new Image();img.crossOrigin="anonymous";
    img.onload=()=>{imgCache[id]=img;res(img);};
    img.onerror=()=>{imgCache[id]=null;res(null);};
    img.src=IMG_BASE+id+".png";
  });
}

const canvas=document.getElementById("wc");
const ctx=canvas.getContext("2d");
let currentAngle=0;
let isSpinning=false;

function isNight(){return document.documentElement.getAttribute("data-theme")==="night";}

function resizeCanvas(){
  const wrap=canvas.parentElement;
  const sz=wrap.offsetWidth;
  canvas.width=sz;canvas.height=sz;
}

function drawWheel(angle){
  const S=canvas.width,cx=S/2,cy=S/2,r=S/2-1;
  const N=ITEMS.length,ARC=(2*Math.PI)/N;
  const COLS=isNight()?NIGHT_COLS:DAY_COLS;
  ctx.clearRect(0,0,S,S);

  for(let i=0;i<N;i++){
    const a0=angle+i*ARC,a1=a0+ARC;
    // segment
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a0,a1);ctx.closePath();
    ctx.fillStyle=COLS[i%COLS.length];ctx.fill();
    ctx.strokeStyle="rgba(0,0,0,.28)";ctx.lineWidth=1;ctx.stroke();

    // sprite icon at 70% radius
    const mid=a0+ARC/2;
    const dist=r*.70;
    const ix=cx+Math.cos(mid)*dist;
    const iy=cy+Math.sin(mid)*dist;
    const sz=Math.min(ARC*r*.78,28);
    const img=imgCache[ITEMS[i].id];
    if(img&&sz>6){
      ctx.save();ctx.translate(ix,iy);
      ctx.drawImage(img,-sz/2,-sz/2,sz,sz);
      ctx.restore();
    }

    // label every 5th
    if(i%5===0){
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a0+ARC/2);
      ctx.textAlign="right";
      ctx.fillStyle=isNight()?"rgba(180,200,255,.8)":"rgba(255,255,255,.82)";
      ctx.font="bold 6.5px 'Press Start 2P',monospace";
      ctx.shadowColor="rgba(0,0,0,.95)";ctx.shadowBlur=3;
      const lbl=ITEMS[i].name.length>13?ITEMS[i].name.slice(0,12)+"…":ITEMS[i].name;
      ctx.fillText(lbl,r-8,3);ctx.restore();
    }
  }

  // vignette
  const grd=ctx.createRadialGradient(cx,cy,r*.12,cx,cy,r);
  grd.addColorStop(0,isNight()?"rgba(20,10,50,.08)":"rgba(255,255,255,.04)");
  grd.addColorStop(1,isNight()?"rgba(0,0,20,.38)":"rgba(0,0,0,.28)");
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=grd;ctx.fill();
}

/* ══════════ SPIN ══════════ */
function spin(){
  if(isSpinning)return;
  closeModal();
  isSpinning=true;
  const btn=document.getElementById("spinBtn");
  btn.disabled=true;btn.textContent="SPINNING...";
  document.getElementById("spinLabel").textContent="◆ SPINNING... ◆";

  const N=ITEMS.length,ARC=(2*Math.PI)/N;
  const winner=Math.floor(Math.random()*N);
  const spins=(6+Math.floor(Math.random()*5))*2*Math.PI;
  const target=-Math.PI/2-winner*ARC-ARC/2;
  const curM=((currentAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const tarM=((target%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const diff=((tarM-curM)+2*Math.PI)%(2*Math.PI);
  const delta=spins+diff;
  const startAngle=currentAngle;
  const DUR=3400;
  const t0=performance.now();
  const ease=t=>1-Math.pow(1-t,4);

  function frame(now){
    const p=Math.min((now-t0)/DUR,1);
    currentAngle=startAngle+delta*ease(p);
    drawWheel(currentAngle);
    if(p<1){requestAnimationFrame(frame);}
    else{
      isSpinning=false;
      btn.disabled=false;btn.textContent="▶ SPIN THE WHEEL";
      document.getElementById("spinLabel").textContent="";
      showResult(ITEMS[winner]);
    }
  }
  requestAnimationFrame(frame);
}

/* ══════════ MODAL ══════════ */
function showResult(item){
  document.getElementById("resultName").textContent=item.name;
  document.getElementById("resultCat").textContent="[ "+item.cat+" ]";
  document.getElementById("resultDesc").textContent=item.desc||"";
  const img=document.getElementById("resultImg");
  const emoji=document.getElementById("resultEmoji");
  img.style.display="block";emoji.style.display="none";
  img.onload=()=>{img.style.display="block";emoji.style.display="none";};
  img.onerror=()=>{img.style.display="none";emoji.style.display="block";emoji.textContent=item.e;};
  img.src=IMG_BASE+item.id+".png";
  const box=document.querySelector(".modal-box");
  box.style.animation="none";
  requestAnimationFrame(()=>{box.style.animation="";});
  document.getElementById("modal").classList.add("open");
}
function closeModal(){document.getElementById("modal").classList.remove("open");}

document.getElementById("btnClose").onclick=closeModal;
document.getElementById("modal").onclick=closeModal;
document.querySelector(".modal-box").onclick=e=>e.stopPropagation();
document.getElementById("btnAgain").onclick=()=>{closeModal();setTimeout(spin,150);};
document.getElementById("spinBtn").onclick=spin;

// Redraw on theme change
document.getElementById("themeToggle").addEventListener("click",()=>{
  requestAnimationFrame(()=>drawWheel(currentAngle));
});

/* ══════════ BOOT ══════════ */
async function boot(){
  let apiMap={};
  try{
    const r=await fetch("https://minecraft-api.vercel.app/api/items");
    const d=await r.json();
    d.forEach(it=>{apiMap[it.namespacedId]=it;});
  }catch(_){}
  ITEMS.forEach(it=>{it.desc=apiMap[it.id]?.description||"";});

  const loadBar=document.getElementById("loadBar");
  const loadMsg=document.getElementById("loadMsg");
  loadMsg.textContent="Loading sprites...";

  const BATCH=10;
  for(let i=0;i<ITEMS.length;i+=BATCH){
    await Promise.all(ITEMS.slice(i,i+BATCH).map(it=>preloadImg(it.id)));
    loadBar.style.width=Math.round(Math.min((i+BATCH)/ITEMS.length*100,100))+"%";
  }

  document.getElementById("loadSection").style.display="none";
  const ws=document.getElementById("wheelSection");
  ws.style.display="flex";
  document.getElementById("spinLabel").style.display="block";
  const btn=document.getElementById("spinBtn");
  btn.style.display="block";btn.disabled=false;
  document.getElementById("badge").textContent=ITEMS.length+" SURVIVAL ITEMS";

  resizeCanvas();
  drawWheel(currentAngle);
}

window.addEventListener("resize",()=>{
  if(document.getElementById("wheelSection").style.display!=="none"){
    resizeCanvas();drawWheel(currentAngle);
  }
});

boot();
